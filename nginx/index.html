<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Caminhos em Ilhas</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; }
    .card { background: white; border-radius: 8px; padding: 16px; margin: 12px 0; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .card h2 { margin-top: 0; color: #0066cc; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .metrica { flex: 1; min-width: 120px; background: #eef4ff; border-radius: 6px; padding: 10px; text-align: center; }
    .metrica span { display: block; font-size: 1.6em; font-weight: bold; color: #0044aa; }
    .metrica small { color: #555; font-size: 0.8em; }
    button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1em; }
    button:hover { background: #0044aa; }
    #status { color: #888; margin: 8px 0; }
    .seq { font-family: monospace; font-size: 0.75em; word-break: break-all; color: #444; }
  </style>
</head>
<body>
  <h1>🗺️ Caminhos em Ilhas</h1>
  <p>Visualização dos resultados gerados pelo contêiner <strong>app</strong>, servidos pela <strong>API</strong> e exibidos aqui via <strong>Nginx</strong>.</p>
  <button onclick="buscarResultados()">🔄 Carregar Resultados</button>
  <p id="status"></p>
  <div id="resultados"></div>

  <script>
    async function buscarResultados() {
      const status = document.getElementById('status');
      const div = document.getElementById('resultados');
      status.textContent = 'Buscando...';
      div.innerHTML = '';
      try {
        const resp = await fetch('/api/resultados');
        if (!resp.ok) {
          const err = await resp.json();
          status.textContent = err.aviso || 'Erro ao buscar resultados.';
          return;
        }
        const dados = await resp.json();
        status.textContent = `${dados.length} ilha(s) carregada(s).`;
        for (const item of dados) {
          const aleatorias = item.aleatorias || [];
          const custos = aleatorias.map(a => a.custo);
          const min = custos.length ? Math.min(...custos) : '-';
          const max = custos.length ? Math.max(...custos) : '-';

          div.innerHTML += `
            <div class="card">
              <h2>${item.ilha}</h2>
              <p style="color:#666;font-size:0.85em">Gerado em: ${item.timestamp || '-'}</p>
              <div class="row">
                <div class="metrica"><span>${item.fixa?.custo ?? '-'}</span><small>Fixa</small></div>
                <div class="metrica"><span>${item.gulosa?.custo ?? '-'}</span><small>Gulosa</small></div>
                <div class="metrica"><span>${item.melhor_aleatoria?.custo ?? '-'}</span><small>Melhor Aleatória</small></div>
                <div class="metrica"><span>${min}</span><small>Min Aleat.</small></div>
                <div class="metrica"><span>${max}</span><small>Max Aleat.</small></div>
              </div>
              <p><strong>Sequência Gulosa:</strong><br>
                <span class="seq">${item.gulosa?.sequencia ?? '-'}</span>
              </p>
            </div>`;
        }
      } catch (e) {
        status.textContent = 'Erro de conexão com a API.';
      }
    }
  </script>
</body>
</html>
